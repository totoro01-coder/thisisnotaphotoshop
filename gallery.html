<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fake Adobe™ — Gallery</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&family=IBM+Plex+Sans:wght@300;400&display=swap');
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{width:100%;height:100%;overflow:hidden;background:#eeeeec;font-family:'IBM Plex Sans',sans-serif;}

  /* HEADER */
  header{
    position:fixed;top:0;left:0;right:0;z-index:100;
    height:38px;padding:0 24px;
    background:rgba(238,238,236,.9);backdrop-filter:blur(8px);
    border-bottom:1px solid #ddd;
    display:flex;align-items:center;justify-content:space-between;
  }
  .logo{font-family:'IBM Plex Mono',monospace;font-size:13px;color:#4a90d9;font-weight:500;text-decoration:none;}
  .hright{display:flex;align-items:center;gap:16px;}
  #count-label{font-family:'IBM Plex Mono',monospace;font-size:10px;color:#aaa;}
  .back{font-family:'IBM Plex Mono',monospace;font-size:10px;color:#aaa;text-decoration:none;}
  .back:hover{color:#333;}

  /* TITLE BELOW CARD */
  #card-label{
    position:fixed;top:50%;left:50%;
    transform:translate(-50%, calc(-50% + 200px));
    text-align:center;z-index:50;pointer-events:none;
    transition:opacity .3s;
  }
  #card-title{font-family:'IBM Plex Mono',monospace;font-size:13px;color:#222;margin-bottom:3px;}
  #card-meta{font-family:'IBM Plex Mono',monospace;font-size:10px;color:#aaa;}

  /* COUNTER */
  #counter{
    position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
    font-family:'IBM Plex Mono',monospace;font-size:10px;color:#bbb;z-index:100;
  }

  /* HINT */
  #hint{
    position:fixed;bottom:44px;left:50%;transform:translateX(-50%);
    font-family:'IBM Plex Mono',monospace;font-size:10px;color:#ccc;
    z-index:100;pointer-events:none;transition:opacity .6s;white-space:nowrap;
  }

  /* NAV ARROWS */
  .nav-btn{
    position:fixed;top:50%;z-index:100;
    background:none;border:none;cursor:pointer;
    color:#bbb;font-size:28px;padding:16px;
    transform:translateY(-50%);
    transition:color .2s;
    user-select:none;
  }
  .nav-btn:hover{color:#555;}
  #nav-prev{left:8px;}
  #nav-next{right:8px;}

  /* STAGE */
  #stage{
    position:fixed;inset:0;top:38px;
    display:flex;align-items:center;justify-content:center;
    perspective:1200px;
    overflow:hidden;
  }

  /* CARDS */
  .flow-card{
    position:absolute;
    width:260px;
    border-radius:6px;
    overflow:hidden;
    cursor:pointer;
    will-change:transform,opacity;
    box-shadow:0 8px 40px rgba(0,0,0,.22),0 2px 8px rgba(0,0,0,.1);
    transform-origin:center center;
    background:#fff;
    -webkit-backface-visibility:hidden;
    backface-visibility:hidden;
  }
  .flow-card img{
    width:100%;aspect-ratio:1/1;object-fit:cover;display:block;background:#e0e0e0;
  }
  .flow-card .cinfo{
    padding:10px 12px 12px;background:#fff;border-top:1px solid #f0f0f0;
    display:none; /* title shown in #card-label instead */
  }

  /* DELETE BUTTON */
  .del-btn{
    position:absolute;top:8px;right:8px;
    width:26px;height:26px;border-radius:50%;
    background:rgba(0,0,0,.45);border:none;
    color:rgba(255,255,255,.8);font-size:13px;
    cursor:pointer;display:flex;align-items:center;justify-content:center;
    opacity:0;transition:opacity .2s,background .15s;
    z-index:10;
  }
  .flow-card:hover .del-btn{ opacity:1; }
  .del-btn:hover{ background:rgba(180,40,40,.85);color:#fff; }

  /* CONFIRM DIALOG */
  #del-dialog{
    display:none;position:fixed;inset:0;z-index:500;
    background:rgba(0,0,0,.5);align-items:center;justify-content:center;
  }
  #del-dialog.open{display:flex;}
  #del-box{
    background:#fff;border-radius:6px;padding:24px;
    width:300px;display:flex;flex-direction:column;gap:14px;
    box-shadow:0 8px 32px rgba(0,0,0,.2);
  }
  #del-box p{font-family:'IBM Plex Mono',monospace;font-size:11px;color:#333;line-height:1.6;}
  #del-box .del-row{display:flex;gap:8px;}
  #del-confirm{flex:1;padding:8px;background:#c0392b;color:#fff;border:none;
    border-radius:4px;font-family:'IBM Plex Mono',monospace;font-size:11px;cursor:pointer;}
  #del-cancel{flex:1;padding:8px;background:#eee;color:#555;border:none;
    border-radius:4px;font-family:'IBM Plex Mono',monospace;font-size:11px;cursor:pointer;}
  #loading,#empty{
    position:fixed;inset:0;display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:12px;
    font-family:'IBM Plex Mono',monospace;font-size:12px;color:#aaa;text-align:center;
  }
  #empty a{color:#4a90d9;text-decoration:none;}
</style>
</head>
<body>

<header>
  <a class="logo" href="./index.html">Fa</a>
  <div class="hright">
    <span id="count-label"></span>
    <a class="back" href="./index.html">← Fake Adobe™</a>
  </div>
</header>

<button class="nav-btn" id="nav-prev">‹</button>
<button class="nav-btn" id="nav-next">›</button>

<div id="stage"></div>

<div id="card-label">
  <div id="card-title"></div>
  <div id="card-meta"></div>
</div>

<div id="hint">← 스크롤 · 방향키 · 스와이프 →</div>
<div id="counter"></div>

<div id="del-dialog">
  <div id="del-box">
    <p id="del-msg">이 악보를 삭제할까요?<br>삭제하면 복구할 수 없습니다.</p>
    <div class="del-row">
      <button id="del-confirm">삭제</button>
      <button id="del-cancel">취소</button>
    </div>
  </div>
</div>

<div id="loading">불러오는 중...</div>
<div id="empty" style="display:none">
  <span style="font-size:32px;opacity:.25">♩</span>
  <span>아직 업로드된 악보가 없습니다</span>
  <a href="./index.html">Fake Adobe™에서 만들어보세요 →</a>
</div>

<script>
// ══════════════════════════════════════════════
// SUPABASE CONFIG — 아래 두 값을 본인 프로젝트 값으로 교체하세요
// ══════════════════════════════════════════════
const SUPABASE_URL = 'https://hbzwlrawarhmxkjhkixd.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhiendscmF3YXJobXhramhraXhkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk4MDY0NTUsImV4cCI6MjA5NTM4MjQ1NX0.6RNlIskTtWGN-99HBIPqHI7eR8mheVPg1Yuq9JyCNZ8';

// ── CARD LAYOUT ──────────────────────────────
// How each offset position looks:
// offset 0  = center (biggest)
// offset ±1 = one step away (smaller, slightly rotated)
// offset ±N = further (even smaller)
const CARD_W = 260;
const STEP   = CARD_W * 0.48; // ~50% overlap between cards

function getCardTransform(offset) {
  const abs = Math.abs(offset);
  const sign = offset < 0 ? -1 : 1;

  if (abs > 5) return { display: 'none' };

  // Progressive values by distance from center
  const scales   = [1,    0.80, 0.65, 0.52, 0.41, 0.32];
  const rotates  = [0,    22,   32,   38,   42,   45];   // rotateY degrees
  const opacities= [1,    0.90, 0.78, 0.60, 0.40, 0.22];
  const zIndexes = [100,  90,   80,   70,   60,   50];

  const sc  = scales[abs]   ?? 0.25;
  const ry  = rotates[abs]  ?? 45;
  const op  = opacities[abs]?? 0.1;
  const zi  = zIndexes[abs] ?? 40;

  // X position: step per card, accumulating with perspective foreshortening
  const xSteps = [0, 1, 1.78, 2.42, 2.95, 3.38];
  const tx = sign * STEP * (xSteps[abs] ?? (abs * 0.6));

  return {
    display: 'block',
    transform: `translateX(${tx}px) rotateY(${-sign * ry}deg) scale(${sc})`,
    opacity: op,
    zIndex: zi,
    pointerEvents: abs === 0 ? 'auto' : 'none',
    cursor: abs === 0 ? 'pointer' : 'pointer',
    boxShadow: abs === 0
      ? '0 20px 60px rgba(0,0,0,.30), 0 4px 12px rgba(0,0,0,.15)'
      : '0 8px 32px rgba(0,0,0,.18)',
  };
}

// ── STATE ────────────────────────────────────
let scores = [];
let current = 0;
let busy = false;

// ── AUDIO ────────────────────────────────────
let audioCtx = null;
let soundTimers = [];

function initAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}
function stopSounds() {
  soundTimers.forEach(clearTimeout);
  soundTimers = [];
}
function playTone(freq, pan, vol, dur = 0.35) {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const g   = audioCtx.createGain();
  const p   = audioCtx.createStereoPanner();
  osc.type = 'sine';
  osc.frequency.value = Math.max(20, freq);
  g.gain.setValueAtTime(vol * 0.22, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
  p.pan.value = Math.max(-1, Math.min(1, pan));
  osc.connect(g); g.connect(p); p.connect(audioCtx.destination);
  osc.start(); osc.stop(audioCtx.currentTime + dur);
}
function previewScore(csv) {
  stopSounds();
  const pts = (csv || '').split('|').map(r => {
    const [f, p, v, d] = r.split('.').map(Number);
    return f > 0 ? { freq: f, pan: p / 10, vol: Math.max(0.05, v / 10), delta: d * 10 } : null;
  }).filter(Boolean);
  let cursor = 0;
  pts.forEach((pt, i) => {
    const t = setTimeout(() => playTone(pt.freq, pt.pan, pt.vol, 0.3), cursor);
    soundTimers.push(t);
    if (i < pts.length - 1) cursor += Math.min(pts[i + 1].delta - pt.delta, 600);
  });
}

// ── APPLY POSITIONS ──────────────────────────
function applyPositions(animated = true) {
  const cards = document.querySelectorAll('.flow-card');
  cards.forEach((card, i) => {
    const offset = i - current;
    const s = getCardTransform(offset);
    card.style.transition = animated
      ? 'transform .5s cubic-bezier(.25,.46,.45,.94), opacity .4s ease, box-shadow .4s ease'
      : 'none';
    if (s.display === 'none') {
      card.style.opacity = '0';
      card.style.pointerEvents = 'none';
      card.style.zIndex = '0';
      return;
    }
    card.style.transform   = s.transform;
    card.style.opacity     = s.opacity;
    card.style.zIndex      = s.zIndex;
    card.style.pointerEvents = s.pointerEvents;
    card.style.boxShadow   = s.boxShadow;
    card.style.cursor      = s.cursor;
  });
  updateLabel();
  updateCounter();
}

function updateLabel() {
  if (!scores.length) return;
  const sc = scores[current];
  document.getElementById('card-title').textContent = sc.title || 'Untitled';
  document.getElementById('card-meta').textContent =
    new Date(sc.created_at).toLocaleDateString('ko-KR', { month: 'long', day: 'numeric' });
}

function updateCounter() {
  document.getElementById('counter').textContent =
    scores.length ? (current + 1) + ' / ' + scores.length : '';
}

// ── NAVIGATE ─────────────────────────────────
function goTo(idx, animated = true) {
  if (busy || idx < 0 || idx >= scores.length || idx === current) return;
  busy = true;
  stopSounds();
  current = idx;
  applyPositions(animated);
  setTimeout(() => { busy = false; }, 520);
  document.getElementById('hint').style.opacity = '0';
}
function goNext() { goTo(current + 1); }
function goPrev() { goTo(current - 1); }

// ── BUILD CARDS ──────────────────────────────
function buildCards() {
  const stage = document.getElementById('stage');
  stage.innerHTML = '';

  scores.forEach((score, i) => {
    const card = document.createElement('div');
    card.className = 'flow-card';

    const img = document.createElement('img');
    img.src = score.image_data || '';
    img.alt = score.title || 'Score';
    img.loading = 'lazy';
    img.onerror = () => { img.style.background = '#d8d8d8'; };

    card.appendChild(img);
    // delete button
    const delBtn=document.createElement('button');
    delBtn.className='del-btn';
    delBtn.textContent='✕';
    delBtn.title='삭제';
    delBtn.addEventListener('click',e=>{
      e.stopPropagation();
      pendingDeleteId=score.id;
      pendingDeleteIdx=i;
      document.getElementById('del-msg').textContent=
        `"${score.title||'Untitled'}"을(를) 삭제할까요?\n삭제하면 복구할 수 없습니다.`;
      document.getElementById('del-dialog').classList.add('open');
    });
    card.appendChild(delBtn);

    card.addEventListener('click', () => {
      const offset = i - current;
      if (offset === 0) {
        // center card: play preview then open player
        initAudio();
        previewScore(score.score_data || '');
        setTimeout(() => {
          const base = location.origin +
            location.pathname.replace(/[^/]*$/, '');
          window.open(`${base}player.html?id=${score.id}`, '_blank');
        }, 250);
      } else if (offset > 0) {
        goNext();
      } else {
        goPrev();
      }
    });
  });

  applyPositions(false);
  setTimeout(() => applyPositions(true), 30); // animate in on load
}

// ── INPUT ────────────────────────────────────
document.getElementById('nav-prev').addEventListener('click', goPrev);
document.getElementById('nav-next').addEventListener('click', goNext);

let wheelAcc = 0, wheelTimer = null;
window.addEventListener('wheel', e => {
  e.preventDefault();
  wheelAcc += e.deltaY + e.deltaX;
  clearTimeout(wheelTimer);
  wheelTimer = setTimeout(() => {
    if (Math.abs(wheelAcc) > 40) { wheelAcc > 0 ? goNext() : goPrev(); }
    wheelAcc = 0;
  }, 70);
}, { passive: false });

window.addEventListener('keydown', e => {
  if (['ArrowRight', 'ArrowDown', ' '].includes(e.key)) { e.preventDefault(); goNext(); }
  if (['ArrowLeft', 'ArrowUp'].includes(e.key))          { e.preventDefault(); goPrev(); }
});

let tx0 = 0;
window.addEventListener('touchstart', e => { tx0 = e.touches[0].clientX; }, { passive: true });
window.addEventListener('touchend', e => {
  const dx = tx0 - e.changedTouches[0].clientX;
  if (Math.abs(dx) > 40) { dx > 0 ? goNext() : goPrev(); }
}, { passive: true });

// ── DELETE ────────────────────────────────────
let pendingDeleteId=null, pendingDeleteIdx=-1;

document.getElementById('del-cancel').addEventListener('click',()=>{
  document.getElementById('del-dialog').classList.remove('open');
  pendingDeleteId=null; pendingDeleteIdx=-1;
});

document.getElementById('del-confirm').addEventListener('click',async()=>{
  if(!pendingDeleteId) return;
  const id=pendingDeleteId, idx=pendingDeleteIdx;
  document.getElementById('del-dialog').classList.remove('open');
  try{
    const res=await fetch(
      `${SUPABASE_URL}/rest/v1/scores?id=eq.${id}`,
      {method:'DELETE',
       headers:{Authorization:`Bearer ${SUPABASE_ANON_KEY}`,apikey:SUPABASE_ANON_KEY}}
    );
    if(!res.ok) throw new Error('삭제 실패 '+res.status);
    scores.splice(idx,1);
    if(current>=scores.length) current=Math.max(0,scores.length-1);
    document.getElementById('count-label').textContent=scores.length+' scores';
    if(!scores.length){
      document.getElementById('empty').style.display='flex';
      document.getElementById('stage').innerHTML='';
      document.getElementById('counter').textContent='';
      document.getElementById('card-title').textContent='';
      document.getElementById('card-meta').textContent='';
    } else {
      buildCards();
    }
  }catch(err){ alert('삭제 오류: '+err.message); }
  pendingDeleteId=null; pendingDeleteIdx=-1;
});

// ── FETCH ────────────────────────────────────
async function loadGallery() {
  try {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/scores?order=created_at.desc&limit=100`,
      { headers: { Authorization: `Bearer ${SUPABASE_ANON_KEY}`, apikey: SUPABASE_ANON_KEY } }
    );
    if (!res.ok) throw new Error('불러오기 실패 ' + res.status);
    scores = await res.json();
    document.getElementById('loading').style.display = 'none';
    document.getElementById('count-label').textContent = scores.length + ' scores';
    if (!scores.length) { document.getElementById('empty').style.display = 'flex'; return; }
    buildCards();
    setTimeout(() => document.getElementById('hint').style.opacity = '0', 3000);
  } catch (err) {
    const l = document.getElementById('loading');
    l.textContent = '⚠ ' + err.message;
    l.style.color = '#c0392b';
  }
}
loadGallery();
</script>
</body>
</html>
