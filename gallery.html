<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fake Adobe™ — Gallery</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&family=IBM+Plex+Sans:wght@300;400&display=swap');
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{width:100%;height:100%;overflow:hidden;background:#eeeeec;font-family:'IBM Plex Sans',sans-serif;}

  header{
    position:fixed;top:0;left:0;right:0;z-index:100;
    height:38px;padding:0 24px;
    background:rgba(238,238,236,.92);backdrop-filter:blur(8px);
    border-bottom:1px solid #ddd;
    display:flex;align-items:center;justify-content:space-between;
  }
  .logo{font-family:'IBM Plex Mono',monospace;font-size:13px;color:#4a90d9;font-weight:500;text-decoration:none;}
  .hright{display:flex;align-items:center;gap:16px;}
  #count-label{font-family:'IBM Plex Mono',monospace;font-size:10px;color:#aaa;}
  .back{font-family:'IBM Plex Mono',monospace;font-size:10px;color:#aaa;text-decoration:none;}
  .back:hover{color:#333;}

  #card-label{
    position:fixed;top:50%;left:50%;
    transform:translate(-50%, calc(-50% + 180px));
    text-align:center;z-index:50;pointer-events:none;
    transition:opacity .3s;
  }
  #card-title{font-family:'IBM Plex Mono',monospace;font-size:13px;color:#222;margin-bottom:3px;}
  #card-meta{font-family:'IBM Plex Mono',monospace;font-size:10px;color:#aaa;}

  #counter{
    position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
    font-family:'IBM Plex Mono',monospace;font-size:10px;color:#bbb;z-index:100;
  }
  #hint{
    position:fixed;bottom:38px;left:50%;transform:translateX(-50%);
    font-family:'IBM Plex Mono',monospace;font-size:10px;color:#ccc;
    z-index:100;pointer-events:none;transition:opacity .6s;white-space:nowrap;
  }

  .nav-btn{
    position:fixed;top:50%;z-index:100;
    background:none;border:none;cursor:pointer;
    color:#bbb;font-size:32px;padding:16px;
    transform:translateY(-50%);transition:color .2s;user-select:none;
  }
  .nav-btn:hover{color:#444;}
  #nav-prev{left:4px;}
  #nav-next{right:4px;}

  #stage{
    position:fixed;inset:0;top:38px;
    display:flex;align-items:center;justify-content:center;
    overflow:hidden;
  }

  .flow-card{
    position:absolute;
    width:260px;
    border-radius:6px;overflow:hidden;cursor:pointer;
    will-change:transform,opacity;
    box-shadow:0 8px 40px rgba(0,0,0,.22);
    transform-origin:center center;
    background:#fff;
  }
  .flow-card img{
    width:100%;aspect-ratio:1/1;object-fit:cover;display:block;background:#e0e0e0;
  }
  .flow-card .cinfo{padding:10px 12px 12px;background:#fff;border-top:1px solid #f0f0f0;}
  .ctitle{font-family:'IBM Plex Mono',monospace;font-size:10px;color:#333;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px;}
  .cmeta{font-family:'IBM Plex Mono',monospace;font-size:9px;color:#aaa;}

  /* delete button — appears on hover of front card */
  .del-btn{
    position:absolute;top:8px;right:8px;width:26px;height:26px;
    border-radius:50%;background:rgba(0,0,0,.45);border:none;
    color:rgba(255,255,255,.8);font-size:12px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    opacity:0;transition:opacity .2s,background .15s;z-index:10;
  }
  .flow-card:hover .del-btn{opacity:1;}
  .del-btn:hover{background:rgba(180,40,40,.85);color:#fff;}

  /* confirm dialog */
  #del-dialog{
    display:none;position:fixed;inset:0;z-index:500;
    background:rgba(0,0,0,.45);align-items:center;justify-content:center;
  }
  #del-dialog.open{display:flex;}
  #del-box{
    background:#fff;border-radius:6px;padding:24px;width:290px;
    display:flex;flex-direction:column;gap:14px;
    box-shadow:0 8px 32px rgba(0,0,0,.2);
  }
  #del-msg{font-family:'IBM Plex Mono',monospace;font-size:11px;color:#333;line-height:1.6;}
  .del-row{display:flex;gap:8px;}
  #del-yes{flex:1;padding:8px;background:#c0392b;color:#fff;border:none;
    border-radius:4px;font-family:'IBM Plex Mono',monospace;font-size:11px;cursor:pointer;}
  #del-no{flex:1;padding:8px;background:#eee;color:#555;border:none;
    border-radius:4px;font-family:'IBM Plex Mono',monospace;font-size:11px;cursor:pointer;}

  #loading,#empty{
    position:fixed;inset:0;display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:12px;
    font-family:'IBM Plex Mono',monospace;font-size:12px;color:#aaa;text-align:center;
  }
  #empty a{color:#4a90d9;text-decoration:none;}
</style>
</head>
<body>

<header>
  <a class="logo" href="./index.html">Fa</a>
  <div class="hright">
    <span id="count-label"></span>
    <a class="back" href="./index.html">← Fake Adobe™</a>
  </div>
</header>

<button class="nav-btn" id="nav-prev">‹</button>
<button class="nav-btn" id="nav-next">›</button>

<div id="stage"></div>

<div id="card-label">
  <div id="card-title"></div>
  <div id="card-meta"></div>
</div>

<div id="hint">← 스크롤 · 방향키 · 스와이프 →</div>
<div id="counter"></div>

<div id="loading">불러오는 중...</div>
<div id="empty" style="display:none">
  <span style="font-size:32px;opacity:.25">♩</span>
  <span>아직 업로드된 악보가 없습니다</span>
  <a href="./index.html">Fake Adobe™에서 만들어보세요 →</a>
</div>

<div id="del-dialog">
  <div id="del-box">
    <div id="del-msg">이 악보를 삭제할까요?</div>
    <div class="del-row">
      <button id="del-yes">삭제</button>
      <button id="del-no">취소</button>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://hbzwlrawarhmxkjhkixd.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhiendscmF3YXJobXhramhraXhkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk4MDY0NTUsImV4cCI6MjA5NTM4MjQ1NX0.6RNlIskTtWGN-99HBIPqHI7eR8mheVPg1Yuq9JyCNZ8';

const CARD_W = 260;
const STEP   = CARD_W * 0.50;

function getStyle(offset) {
  const abs = Math.abs(offset), sign = offset < 0 ? -1 : 1;
  if (abs > 5) return null;
  const scales   = [1,    0.80, 0.65, 0.52, 0.41, 0.32];
  const rotates  = [0,    22,   32,   38,   42,   45];
  const opacities= [1,    0.88, 0.75, 0.58, 0.38, 0.20];
  const xSteps   = [0,    1,    1.78, 2.42, 2.95, 3.38];
  const tx = sign * STEP * xSteps[abs];
  return {
    transform: `translateX(${tx}px) rotateY(${-sign*rotates[abs]}deg) scale(${scales[abs]})`,
    opacity: opacities[abs],
    zIndex: 100 - abs * 10,
    pointerEvents: abs === 0 ? 'auto' : 'pointer',
    boxShadow: abs === 0
      ? '0 20px 60px rgba(0,0,0,.28), 0 4px 12px rgba(0,0,0,.14)'
      : '0 8px 32px rgba(0,0,0,.16)',
    transition: 'transform .5s cubic-bezier(.25,.46,.45,.94), opacity .4s ease, box-shadow .4s'
  };
}

let scores = [], current = 0, busy = false;

function applyAll(animated) {
  document.querySelectorAll('.flow-card').forEach((card, i) => {
    const s = getStyle(i - current);
    if (!s) { card.style.opacity = '0'; card.style.pointerEvents = 'none'; return; }
    if (!animated) s.transition = 'none';
    Object.assign(card.style, s);
  });
  updateLabel();
  document.getElementById('counter').textContent =
    scores.length ? (current+1)+' / '+scores.length : '';
}

function updateLabel() {
  if (!scores.length) return;
  const sc = scores[current];
  document.getElementById('card-title').textContent = sc.title || 'Untitled';
  document.getElementById('card-meta').textContent =
    new Date(sc.created_at).toLocaleDateString('ko-KR',{month:'long',day:'numeric'});
}

function goTo(idx) {
  if (busy || idx < 0 || idx >= scores.length || idx === current) return;
  busy = true; current = idx;
  applyAll(true);
  setTimeout(() => { busy = false; }, 520);
  document.getElementById('hint').style.opacity = '0';
}
const goNext = () => goTo(current + 1);
const goPrev = () => goTo(current - 1);

// ── AUDIO ──
let audioCtx = null;
let soundTids = [];
function stopSounds() { soundTids.forEach(clearTimeout); soundTids = []; }
function playTone(freq, pan, vol, dur) {
  if (!audioCtx) return;
  const o=audioCtx.createOscillator(), g=audioCtx.createGain(), p=audioCtx.createStereoPanner();
  o.type='sine'; o.frequency.value=Math.max(20,freq);
  g.gain.setValueAtTime(vol*.22,audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(.001,audioCtx.currentTime+dur);
  p.pan.value=Math.max(-1,Math.min(1,pan));
  o.connect(g); g.connect(p); p.connect(audioCtx.destination);
  o.start(); o.stop(audioCtx.currentTime+dur);
}
function preview(csv) {
  if (!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  stopSounds();
  (csv||'').split('|').forEach((r,i,arr) => {
    const [f,p,v,d]=r.split('.').map(Number);
    if (!f||f<=0) return;
    let cursor=0;
    for(let k=0;k<i;k++){const[,,, dk]=arr[k].split('.').map(Number); cursor+=Math.min(dk*10,600);}
    const t=setTimeout(()=>playTone(f,p/10,Math.max(.05,v/10),.3),cursor);
    soundTids.push(t);
  });
}

// ── BUILD CARDS ──
function buildCards() {
  const stage = document.getElementById('stage');
  stage.innerHTML = '';
  scores.forEach((score, i) => {
    const card = document.createElement('div');
    card.className = 'flow-card';

    const img = document.createElement('img');
    img.src = score.image_data || '';
    img.alt = score.title || '';
    img.loading = 'lazy';
    img.onerror = () => { img.style.background='#d8d8d8'; };

    const delBtn = document.createElement('button');
    delBtn.className = 'del-btn';
    delBtn.title = '삭제';
    delBtn.textContent = '✕';
    delBtn.addEventListener('click', e => {
      e.stopPropagation();
      openDelDialog(score.id, score.title, i);
    });

    card.appendChild(img);
    card.appendChild(delBtn);
    stage.appendChild(card); // ← 반드시 여기!

    card.addEventListener('click', () => {
      const offset = i - current;
      if (offset === 0) {
        preview(score.score_data);
        const base = location.origin + location.pathname.replace(/[^/]*$/, '');
        setTimeout(() => window.open(`${base}player.html?id=${score.id}`,'_blank'), 250);
      } else {
        offset > 0 ? goNext() : goPrev();
      }
    });
  });
  applyAll(false);
  requestAnimationFrame(() => applyAll(true));
}

// ── DELETE ──
let delId = null, delIdx = -1;
function openDelDialog(id, title, idx) {
  delId = id; delIdx = idx;
  document.getElementById('del-msg').textContent =
    `"${title||'Untitled'}"을(를) 삭제할까요?\n삭제하면 복구할 수 없습니다.`;
  document.getElementById('del-dialog').classList.add('open');
}
document.getElementById('del-no').addEventListener('click', () => {
  document.getElementById('del-dialog').classList.remove('open');
});
document.getElementById('del-yes').addEventListener('click', async () => {
  document.getElementById('del-dialog').classList.remove('open');
  if (!delId) return;
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/scores?id=eq.${delId}`, {
      method: 'DELETE',
      headers: { Authorization:`Bearer ${SUPABASE_ANON_KEY}`, apikey: SUPABASE_ANON_KEY }
    });
    if (!res.ok) throw new Error('삭제 실패');
    scores.splice(delIdx, 1);
    current = Math.min(current, Math.max(0, scores.length - 1));
    document.getElementById('count-label').textContent = scores.length + ' scores';
    if (!scores.length) {
      document.getElementById('stage').innerHTML = '';
      document.getElementById('counter').textContent = '';
      document.getElementById('card-title').textContent = '';
      document.getElementById('card-meta').textContent = '';
      document.getElementById('empty').style.display = 'flex';
    } else {
      buildCards();
    }
  } catch(e) { alert('오류: '+e.message); }
  delId = null; delIdx = -1;
});

// ── INPUT ──
document.getElementById('nav-prev').addEventListener('click', goPrev);
document.getElementById('nav-next').addEventListener('click', goNext);
let wacc=0, wtimer=null;
window.addEventListener('wheel', e => {
  e.preventDefault();
  wacc += e.deltaY + e.deltaX;
  clearTimeout(wtimer);
  wtimer = setTimeout(() => { if(Math.abs(wacc)>40){wacc>0?goNext():goPrev();} wacc=0; }, 70);
}, { passive: false });
window.addEventListener('keydown', e => {
  if(['ArrowRight','ArrowDown',' '].includes(e.key)){e.preventDefault();goNext();}
  if(['ArrowLeft','ArrowUp'].includes(e.key)){e.preventDefault();goPrev();}
});
let tx0=0;
window.addEventListener('touchstart',e=>{tx0=e.touches[0].clientX;},{passive:true});
window.addEventListener('touchend',e=>{
  const dx=tx0-e.changedTouches[0].clientX;
  if(Math.abs(dx)>40){dx>0?goNext():goPrev();}
},{passive:true});
window.addEventListener('resize',()=>{ if(scores.length) applyAll(false); });

// ── FETCH ──
(async () => {
  try {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/scores?select=id,title,score_data,image_data,created_at&order=created_at.desc&limit=100`,
      { headers: { Authorization:`Bearer ${SUPABASE_ANON_KEY}`, apikey: SUPABASE_ANON_KEY } }
    );
    if (!res.ok) throw new Error('HTTP ' + res.status + ': ' + await res.text());
    scores = await res.json();
    document.getElementById('loading').style.display = 'none';
    document.getElementById('count-label').textContent = scores.length + ' scores';
    if (!scores.length) { document.getElementById('empty').style.display='flex'; return; }
    buildCards();
    setTimeout(() => document.getElementById('hint').style.opacity='0', 3000);
  } catch(e) {
    const l = document.getElementById('loading');
    l.innerHTML = '⚠ 오류:<br>' + e.message;
    l.style.color = '#c0392b';
    l.style.fontSize = '11px';
  }
})();
</script>
</body>
</html>
