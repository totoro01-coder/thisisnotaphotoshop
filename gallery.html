<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fake Adobe™ — Gallery</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&family=IBM+Plex+Sans:wght@300;400&display=swap');
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{
    width:100%;height:100%;overflow:hidden;
    background:#f0f0f0;
    font-family:'IBM Plex Sans',sans-serif;
  }

  /* ── HEADER ── */
  header{
    position:fixed;top:0;left:0;right:0;z-index:200;
    padding:0 24px;height:38px;
    background:rgba(240,240,240,.92);
    backdrop-filter:blur(8px);
    border-bottom:1px solid #ddd;
    display:flex;align-items:center;justify-content:space-between;
  }
  .logo{
    font-family:'IBM Plex Mono',monospace;font-size:13px;
    color:#4a90d9;font-weight:500;text-decoration:none;
  }
  .header-right{display:flex;align-items:center;gap:16px;}
  #count-label{font-family:'IBM Plex Mono',monospace;font-size:10px;color:#999;}
  .back-link{
    font-family:'IBM Plex Mono',monospace;font-size:10px;
    color:#999;text-decoration:none;
  }
  .back-link:hover{color:#333;}

  /* ── HINT ── */
  #hint{
    position:fixed;bottom:28px;left:50%;transform:translateX(-50%);
    font-family:'IBM Plex Mono',monospace;font-size:10px;color:#aaa;
    pointer-events:none;z-index:200;text-align:center;
    transition:opacity .6s;
    white-space:nowrap;
  }

  /* ── COUNTER ── */
  #counter{
    position:fixed;bottom:28px;right:24px;
    font-family:'IBM Plex Mono',monospace;font-size:11px;color:#aaa;
    z-index:200;
  }

  /* ── STAGE ── */
  #stage{
    position:fixed;inset:0;
    display:flex;align-items:center;justify-content:center;
    padding-top:38px;
    /* NO perspective here — we apply it per card stack */
  }

  /* ── DECK WRAPPER — holds all cards stacked ── */
  #deck{
    position:relative;
    width:clamp(240px,38vw,340px);
    /* height set by JS */
    transform-style:preserve-3d;
    perspective:1000px;
  }

  /* ── INDIVIDUAL CARD ── */
  .deck-card{
    position:absolute;
    top:0;left:0;
    width:100%;
    border-radius:4px;
    overflow:hidden;
    box-shadow:0 6px 32px rgba(0,0,0,.18), 0 1px 4px rgba(0,0,0,.1);
    will-change:transform,opacity;
    cursor:pointer;
    transform-origin:center bottom;
    background:#fff;
  }
  .deck-card img{
    width:100%;
    aspect-ratio:4/3;
    object-fit:cover;
    display:block;
    background:#e8e8e8;
  }
  .card-info{
    padding:10px 12px 12px;
    background:#fff;
    border-top:1px solid #f0f0f0;
  }
  .card-title{
    font-family:'IBM Plex Mono',monospace;font-size:11px;color:#222;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
    margin-bottom:2px;
  }
  .card-meta{font-family:'IBM Plex Mono',monospace;font-size:9px;color:#aaa;}

  /* playing indicator */
  .deck-card.playing{
    box-shadow:0 6px 32px rgba(74,144,217,.3),0 0 0 2px #4a90d9;
  }

  /* ── LOADING / EMPTY ── */
  #loading,#empty{
    position:fixed;inset:0;
    display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:12px;
    font-family:'IBM Plex Mono',monospace;font-size:12px;color:#aaa;
    text-align:center;
  }
  #empty a{color:#4a90d9;text-decoration:none;font-size:11px;}
</style>
</head>
<body>

<header>
  <a class="logo" href="./index.html">Fa</a>
  <div class="header-right">
    <span id="count-label"></span>
    <a class="back-link" href="./index.html">← Fake Adobe™</a>
  </div>
</header>

<div id="hint">↕ 스크롤 · 방향키 · 스와이프로 넘기기</div>
<div id="counter"></div>
<div id="stage"><div id="deck"></div></div>
<div id="loading">불러오는 중...</div>
<div id="empty" style="display:none">
  <span style="font-size:32px;opacity:.3">♩</span>
  <span>아직 업로드된 악보가 없습니다</span>
  <a href="./index.html">Fake Adobe™에서 만들어보세요 →</a>
</div>

<script>
// ══════════════════════════════════════════════
// SUPABASE CONFIG — 아래 두 값을 본인 프로젝트 값으로 교체하세요
// ══════════════════════════════════════════════
const SUPABASE_URL = 'https://hbzwlrawarhmxkjhkixd.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhiendscmF3YXJobXhramhraXhkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk4MDY0NTUsImV4cCI6MjA5NTM4MjQ1NX0.6RNlIskTtWGN-99HBIPqHI7eR8mheVPg1Yuq9JyCNZ8';

// ── AUDIO ──
let audioCtx=null;
let soundTimers=[];
function initAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();}
function stopSounds(){soundTimers.forEach(clearTimeout);soundTimers=[];}
function playTone(freq,pan,vol,dur=0.35){
  if(!audioCtx)return;
  const osc=audioCtx.createOscillator(),g=audioCtx.createGain(),p=audioCtx.createStereoPanner();
  osc.type='sine';osc.frequency.value=Math.max(20,freq);
  g.gain.setValueAtTime(vol*.22,audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(.001,audioCtx.currentTime+dur);
  p.pan.value=Math.max(-1,Math.min(1,pan));
  osc.connect(g);g.connect(p);p.connect(audioCtx.destination);
  osc.start();osc.stop(audioCtx.currentTime+dur);
}
function previewScore(csv){
  stopSounds();
  const pts=(csv||'').split('|').map(r=>{
    const[f,p,v,d]=r.split('.').map(Number);
    return f>0?{freq:f,pan:p/10,vol:Math.max(.05,v/10),delta:d*10}:null;
  }).filter(Boolean);
  let cursor=0;
  pts.forEach((pt,i)=>{
    const t=setTimeout(()=>playTone(pt.freq,pt.pan,pt.vol,.3),cursor);
    soundTimers.push(t);
    if(i<pts.length-1)cursor+=Math.min(pts[i+1].delta-pt.delta,600);
  });
}

// ── STATE ──
let scores=[];
let current=0;
let busy=false;

// ── CARD POSITION CALCULATOR ──
// offset: 0=top(front), 1=second, 2=third... negative=gone
function cardStyle(offset){
  if(offset<0){
    // already passed — fly off upward (hidden)
    return {
      transform:`translateY(-120%) rotate(-8deg) scale(.9)`,
      opacity:0, zIndex:0, transition:'none', pointerEvents:'none'
    };
  }
  // visible stack: each card slightly lower and smaller
  const MAX_VISIBLE=5;
  if(offset>MAX_VISIBLE) return {
    transform:`translateY(${MAX_VISIBLE*14}px) scale(${1-MAX_VISIBLE*.04})`,
    opacity:0, zIndex:0, pointerEvents:'none',
    transition:'none'
  };
  const ty   = offset * 14;          // each card 14px lower
  const sc   = 1 - offset * 0.04;    // each card 4% smaller
  const op   = 1 - offset * 0.15;    // each card 15% more transparent
  const z    = 100 - offset * 10;
  return {
    transform:`translateY(${ty}px) scale(${sc})`,
    opacity: Math.max(0,op),
    zIndex:  z,
    pointerEvents: offset===0 ? 'auto':'none'
  };
}

// apply positions to all card elements
function applyPositions(animated=true){
  const els=document.querySelectorAll('.deck-card');
  els.forEach((el,i)=>{
    const offset=i-current;
    const s=cardStyle(offset);
    el.style.transition=animated
      ?'transform .5s cubic-bezier(.23,1,.32,1), opacity .4s ease'
      :'none';
    el.style.transform=s.transform;
    el.style.opacity=s.opacity;
    el.style.zIndex=s.zIndex;
    el.style.pointerEvents=s.pointerEvents;
  });
}

// update counter
function updateCounter(){
  document.getElementById('counter').textContent=
    scores.length?(current+1)+' / '+scores.length:'';
}

// animate front card flying off, then go to next
function goNext(){
  if(busy||current>=scores.length-1)return;
  busy=true;
  stopSounds();
  document.querySelectorAll('.deck-card').forEach(c=>c.classList.remove('playing'));

  // animate current card flying up and off
  const els=document.querySelectorAll('.deck-card');
  const frontEl=els[current];
  if(frontEl){
    frontEl.style.transition='transform .42s cubic-bezier(.4,0,.2,1), opacity .3s ease';
    frontEl.style.transform=`translateY(-130%) rotate(-6deg) scale(.95)`;
    frontEl.style.opacity='0';
  }

  setTimeout(()=>{
    current++;
    updateCounter();
    applyPositions(true);
    setTimeout(()=>{ busy=false; }, 520);
  }, 120);

  document.getElementById('hint').style.opacity='0';
}

function goPrev(){
  if(busy||current<=0)return;
  busy=true;
  stopSounds();
  document.querySelectorAll('.deck-card').forEach(c=>c.classList.remove('playing'));

  current--;
  // snap current card back (was hidden above)
  const els=document.querySelectorAll('.deck-card');
  const returning=els[current];
  if(returning){
    returning.style.transition='none';
    returning.style.transform=`translateY(-130%) rotate(-6deg) scale(.95)`;
    returning.style.opacity='0';
  }
  // force reflow then animate in
  requestAnimationFrame(()=>{
    requestAnimationFrame(()=>{
      applyPositions(true);
      updateCounter();
      setTimeout(()=>{ busy=false; }, 520);
    });
  });

  document.getElementById('hint').style.opacity='0';
}

// ── BUILD DOM ──
function formatDate(iso){
  return new Date(iso).toLocaleDateString('ko-KR',{month:'short',day:'numeric'});
}

function buildDeck(){
  const deck=document.getElementById('deck');
  deck.innerHTML='';

  // set deck height to match card (img aspect 4:3 + info ~60px)
  const cardW=deck.offsetWidth||300;
  const cardH=Math.round(cardW*(3/4))+60;
  deck.style.height=cardH+'px';

  scores.forEach((score,i)=>{
    const card=document.createElement('div');
    card.className='deck-card';
    card.dataset.index=i;

    const img=document.createElement('img');
    img.src=score.image_data||'';
    img.alt=score.title||'Score';
    img.loading='lazy';
    img.onerror=()=>{ img.style.background='#e0e0e0'; };

    const info=document.createElement('div');
    info.className='card-info';
    info.innerHTML=`
      <div class="card-title">${score.title||'Untitled'}</div>
      <div class="card-meta">${formatDate(score.created_at)}</div>
    `;

    card.appendChild(img);
    card.appendChild(info);

    // click
    card.addEventListener('click',()=>{
      const offset=i-current;
      if(offset===0){
        // front card: preview + open
        initAudio();
        if(card.classList.contains('playing')){
          stopSounds(); card.classList.remove('playing');
        } else {
          card.classList.add('playing');
          previewScore(score.score_data||'');
          setTimeout(()=>{
            const base=location.origin+location.pathname.replace(/[^/]*$/,'');
            window.open(`${base}player.html?id=${score.id}`,'_blank');
          },200);
        }
      } else if(offset>0){
        // tap back card = advance to it one step at a time
        goNext();
      }
    });

    deck.appendChild(card);
  });

  applyPositions(false);
  updateCounter();
}

// ── INPUT ──
let wheelAcc=0, wheelTimer=null;
window.addEventListener('wheel',e=>{
  e.preventDefault();
  wheelAcc+=e.deltaY;
  clearTimeout(wheelTimer);
  wheelTimer=setTimeout(()=>{
    if(Math.abs(wheelAcc)>50){ wheelAcc>0?goNext():goPrev(); }
    wheelAcc=0;
  },80);
},{passive:false});

window.addEventListener('keydown',e=>{
  if(['ArrowDown','ArrowRight',' '].includes(e.key)){ e.preventDefault(); goNext(); }
  if(['ArrowUp','ArrowLeft'].includes(e.key)){ e.preventDefault(); goPrev(); }
});

let ty0=0;
window.addEventListener('touchstart',e=>{ ty0=e.touches[0].clientY; },{passive:true});
window.addEventListener('touchend',e=>{
  const dy=ty0-e.changedTouches[0].clientY;
  if(Math.abs(dy)>45){ dy>0?goNext():goPrev(); }
},{passive:true});

// re-layout on resize
window.addEventListener('resize',()=>{
  if(!scores.length)return;
  const deck=document.getElementById('deck');
  const cardW=deck.offsetWidth||300;
  deck.style.height=(Math.round(cardW*(3/4))+60)+'px';
  applyPositions(false);
});

// ── FETCH ──
async function loadGallery(){
  try{
    const res=await fetch(
      `${SUPABASE_URL}/rest/v1/scores?order=created_at.desc&limit=100`,
      {headers:{Authorization:`Bearer ${SUPABASE_ANON_KEY}`,apikey:SUPABASE_ANON_KEY}}
    );
    if(!res.ok)throw new Error('불러오기 실패 '+res.status);
    scores=await res.json();
    document.getElementById('loading').style.display='none';
    document.getElementById('count-label').textContent=scores.length+' scores';
    if(!scores.length){ document.getElementById('empty').style.display='flex'; return; }
    buildDeck();
    setTimeout(()=>document.getElementById('hint').style.opacity='0', 3500);
  }catch(err){
    const l=document.getElementById('loading');
    l.textContent='⚠ '+err.message; l.style.color='#c0392b';
  }
}
loadGallery();
</script>
</body>
</html>
