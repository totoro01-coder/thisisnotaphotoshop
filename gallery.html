<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fake Adobe™ — Gallery</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&family=IBM+Plex+Sans:wght@300;400&display=swap');
  *{margin:0;padding:0;box-sizing:border-box;}
  :root{
    --bg:#1b1b1b; --accent:#4a90d9; --text:#c8c8c8; --dim:#555;
  }
  html,body{
    width:100%;height:100%;overflow:hidden;
    background:var(--bg);
    font-family:'IBM Plex Sans',sans-serif;
    color:var(--text);
  }

  /* ── HEADER ── */
  header{
    position:fixed;top:0;left:0;right:0;z-index:100;
    padding:0 24px;height:36px;
    background:rgba(27,27,27,.9);
    backdrop-filter:blur(8px);
    border-bottom:1px solid #2a2a2a;
    display:flex;align-items:center;justify-content:space-between;
  }
  .logo{
    font-family:'IBM Plex Mono',monospace;font-size:13px;
    color:var(--accent);font-weight:500;text-decoration:none;
  }
  .header-right{display:flex;align-items:center;gap:16px;}
  #count-label{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--dim);}
  .back-link{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--dim);text-decoration:none;}
  .back-link:hover{color:var(--text);}

  /* ── HINT ── */
  #hint{
    position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
    font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--dim);
    pointer-events:none;z-index:100;
    transition:opacity .4s;
    text-align:center;line-height:1.6;
  }

  /* ── DECK STAGE ── */
  #stage{
    position:fixed;inset:0;
    display:flex;align-items:center;justify-content:center;
    perspective:1400px;
    padding-top:36px;
  }

  /* ── CARD ── */
  .deck-card{
    position:absolute;
    width:clamp(220px,40vw,320px);
    aspect-ratio:1/1.1;
    border-radius:4px;
    overflow:hidden;
    cursor:pointer;
    will-change:transform,opacity;
    transition:transform .55s cubic-bezier(.25,.46,.45,.94),
               opacity .55s ease,
               box-shadow .3s;
    transform-style:preserve-3d;
    user-select:none;
  }
  .deck-card img{
    width:100%;height:80%;object-fit:cover;display:block;
    background:#222;
  }
  .card-info{
    background:#111;padding:10px 12px;
    height:20%;display:flex;flex-direction:column;justify-content:center;gap:2px;
  }
  .card-title{
    font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--text);
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  }
  .card-meta{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--dim);}

  /* playing pulse border */
  .deck-card.playing{box-shadow:0 0 0 2px var(--accent),0 8px 32px rgba(74,144,217,.3);}

  /* ── LOADING / EMPTY ── */
  #loading,#empty{
    position:fixed;inset:0;display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:12px;
    font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--dim);
    text-align:center;
  }
  #empty a{color:var(--accent);text-decoration:none;font-size:11px;}
</style>
</head>
<body>

<header>
  <a class="logo" href="./index.html">Fa</a>
  <div class="header-right">
    <span id="count-label"></span>
    <a class="back-link" href="./index.html">← Fake Adobe™</a>
  </div>
</header>

<div id="hint">↕ 스크롤 또는 방향키로 넘기기 · 클릭으로 재생</div>
<div id="stage"></div>
<div id="loading">불러오는 중...</div>
<div id="empty" style="display:none">
  <span style="font-size:28px;opacity:.3">♩</span>
  <span>아직 업로드된 악보가 없습니다</span>
  <a href="./index.html">Fake Adobe™에서 만들어보세요 →</a>
</div>

<script>
// ══════════════════════════════════════════════
// SUPABASE CONFIG — 아래 두 값을 본인 프로젝트 값으로 교체하세요
// ══════════════════════════════════════════════
const SUPABASE_URL = 'https://hbzwlrawarhmxkjhkixd.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhiendscmF3YXJobXhramhraXhkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk4MDY0NTUsImV4cCI6MjA5NTM4MjQ1NX0.6RNlIskTtWGN-99HBIPqHI7eR8mheVPg1Yuq9JyCNZ8';

// ── AUDIO ──
let audioCtx=null;
let currentSounds=[];
function initAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();}
function stopSounds(){currentSounds.forEach(clearTimeout);currentSounds=[];}
function playTone(freq,pan,vol,dur=0.35){
  if(!audioCtx)return;
  const osc=audioCtx.createOscillator(),gain=audioCtx.createGain(),panN=audioCtx.createStereoPanner();
  osc.type='sine';osc.frequency.value=Math.max(20,freq);
  gain.gain.setValueAtTime(vol*0.22,audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+dur);
  panN.pan.value=Math.max(-1,Math.min(1,pan));
  osc.connect(gain);gain.connect(panN);panN.connect(audioCtx.destination);
  osc.start();osc.stop(audioCtx.currentTime+dur);
}
function previewScore(csv,card){
  initAudio();stopSounds();
  const pts=csv.split('|').map(r=>{
    const[f,p,v,d]=r.split('.').map(Number);
    return f>0?{freq:f,pan:p/10,vol:Math.max(.05,v/10),delta:d*10}:null;
  }).filter(Boolean);
  if(!pts.length)return;
  let cursor=0;
  pts.forEach((pt,i)=>{
    const tid=setTimeout(()=>{playTone(pt.freq,pt.pan,pt.vol,0.3);},cursor);
    currentSounds.push(tid);
    if(i<pts.length-1)cursor+=Math.min(pts[i+1].delta-pt.delta,700);
  });
}

// ── DECK STATE ──
let scores=[];
let current=0; // index of front card
let isAnimating=false;

// ── LAYOUT POSITIONS ──
// Each card gets a position based on distance from current
function getTransform(offset){
  // offset: 0=front, 1=behind-1, 2=behind-2, negative=gone behind
  const abs=Math.abs(offset);
  if(abs>5) return {transform:'translateZ(-800px) scale(.3)',opacity:0,zIndex:0};
  const tz = -abs*90;            // depth
  const ty =  abs*18;            // slight downward shift when behind
  const ry =  offset*0;          // no Y-rotation (cleaner look)
  const scale = Math.pow(.88,abs);
  const opacity = offset<0 ? 0 : Math.max(0, 1-abs*0.18);
  const z = 100-abs*10;
  return{
    transform:`translateZ(${tz}px) translateY(${ty}px) scale(${scale})`,
    opacity,
    zIndex:z
  };
}

function applyPositions(animated=true){
  const cards=document.querySelectorAll('.deck-card');
  cards.forEach((card,i)=>{
    const offset=i-current; // negative=already passed, positive=ahead
    const pos=getTransform(offset);
    card.style.transition=animated
      ?'transform .55s cubic-bezier(.25,.46,.45,.94),opacity .45s ease,z-index 0s'
      :'none';
    card.style.transform=pos.transform;
    card.style.opacity=pos.opacity;
    card.style.zIndex=pos.zIndex;
    card.style.pointerEvents=offset===0?'auto':'none';
  });
}

function goTo(idx){
  if(isAnimating||idx<0||idx>=scores.length)return;
  isAnimating=true;
  stopSounds();
  document.querySelectorAll('.deck-card').forEach(c=>c.classList.remove('playing'));
  current=idx;
  applyPositions(true);
  setTimeout(()=>{isAnimating=false;},600);
  // hide hint after first interaction
  document.getElementById('hint').style.opacity='0';
}

function next(){goTo(current+1);}
function prev(){goTo(current-1);}

// ── BUILD CARDS ──
function formatDate(iso){
  const d=new Date(iso);
  return d.toLocaleDateString('ko-KR',{month:'short',day:'numeric'});
}

function buildCards(){
  const stage=document.getElementById('stage');
  stage.innerHTML='';
  scores.forEach((score,i)=>{
    const card=document.createElement('div');
    card.className='deck-card';
    card.dataset.index=i;

    const img=document.createElement('img');
    img.src=score.image_data||'';
    img.alt=score.title||'Score';
    img.loading='lazy';
    img.onerror=()=>{img.style.background='#1a1a1a';};

    const info=document.createElement('div');
    info.className='card-info';
    info.innerHTML=`
      <div class="card-title">${score.title||'Untitled'}</div>
      <div class="card-meta">${formatDate(score.created_at)}</div>
    `;
    card.appendChild(img);
    card.appendChild(info);

    // click front card = preview / open player
    card.addEventListener('click',()=>{
      const offset=i-current;
      if(offset===0){
        // play preview
        initAudio();
        if(card.classList.contains('playing')){
          stopSounds();card.classList.remove('playing');
        }else{
          card.classList.add('playing');
          previewScore(score.score_data||'',card);
          // open player after brief delay
          setTimeout(()=>{
            const origin=location.origin;
            const pathDir=location.pathname.endsWith('/')
              ?location.pathname
              :location.pathname.substring(0,location.pathname.lastIndexOf('/')+1);
            window.open(`${origin}${pathDir}player.html?id=${score.id}`,'_blank');
          },300);
        }
      } else if(offset>0){
        goTo(i); // tap a back card to bring it forward
      }
    });

    stage.appendChild(card);
  });
  applyPositions(false);
}

// ── INPUT ──
// Wheel
let wheelAcc=0,wheelTimer=null;
window.addEventListener('wheel',e=>{
  e.preventDefault();
  wheelAcc+=e.deltaY;
  clearTimeout(wheelTimer);
  wheelTimer=setTimeout(()=>{
    if(Math.abs(wheelAcc)>40){
      wheelAcc>0?next():prev();
    }
    wheelAcc=0;
  },80);
},{passive:false});

// Keyboard
window.addEventListener('keydown',e=>{
  if(e.key==='ArrowDown'||e.key==='ArrowRight') next();
  if(e.key==='ArrowUp'||e.key==='ArrowLeft')   prev();
});

// Touch swipe
let touchY=0;
window.addEventListener('touchstart',e=>{touchY=e.touches[0].clientY;},{passive:true});
window.addEventListener('touchend',e=>{
  const dy=touchY-e.changedTouches[0].clientY;
  if(Math.abs(dy)>40){dy>0?next():prev();}
},{passive:true});

// ── FETCH ──
async function loadGallery(){
  try{
    const res=await fetch(
      `${SUPABASE_URL}/rest/v1/scores?order=created_at.desc&limit=100`,
      {headers:{'Authorization':`Bearer ${SUPABASE_ANON_KEY}`,'apikey':SUPABASE_ANON_KEY}}
    );
    if(!res.ok)throw new Error('불러오기 실패 '+res.status);
    scores=await res.json();
    document.getElementById('loading').style.display='none';
    document.getElementById('count-label').textContent=scores.length+' scores';
    if(!scores.length){document.getElementById('empty').style.display='flex';return;}
    buildCards();
    // show hint briefly
    setTimeout(()=>{document.getElementById('hint').style.opacity='0';},4000);
  }catch(err){
    const l=document.getElementById('loading');
    l.textContent='⚠ '+err.message;l.style.color='#cc6666';
  }
}
loadGallery();
</script>
</body>
</html>
