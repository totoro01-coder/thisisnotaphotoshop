<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Fake Adobe™ — Sound Score Player</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&family=IBM+Plex+Sans:wght@300;400&display=swap');
  *{margin:0;padding:0;box-sizing:border-box;}
  :root{
    --bg:#ffffff; --panel:#f5f5f5; --border:#e0e0e0;
    --accent:#4a90d9; --text:#1b1b1b; --dim:#888;
  }
  body{
    background:var(--bg); color:var(--text);
    font-family:'IBM Plex Sans',sans-serif;
    min-height:100vh; display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    padding:24px; gap:0;
  }

  /* HEADER */
  .logo{
    position:fixed; top:16px; left:20px;
    font-family:'IBM Plex Mono',monospace;
    font-size:14px; color:#4a90d9; font-weight:500;
    letter-spacing:.03em; text-decoration:none;
  }
  .subtitle{
    font-size:11px; color:var(--dim);
    font-family:'IBM Plex Mono',monospace;
    margin-bottom:32px; text-align:center;
  }

  /* MAIN CARD */
  .card{
    background:#f9f9f9; border:1px solid var(--border);
    border-radius:8px; padding:28px 24px;
    width:100%; max-width:360px;
    display:flex; flex-direction:column; align-items:center; gap:20px;
    box-shadow:0 2px 16px rgba(0,0,0,.08);
  }

  /* VISUALIZER */
  #viz{
    width:100%; height:80px;
    background:#ececec; border-radius:4px;
    display:block;
  }

  /* NOTE DISPLAY */
  .note-display{
    display:flex; gap:6px; flex-wrap:wrap; justify-content:center;
    max-height:60px; overflow:hidden;
  }
  .note-chip{
    font-family:'IBM Plex Mono',monospace; font-size:10px;
    color:var(--accent); background:#e8f0fb;
    border:1px solid #b8d0f0; border-radius:3px;
    padding:2px 6px;
  }

  /* PLAY BUTTON */
  #btn-play{
    width:100%; height:60px;
    background:var(--accent); color:white;
    border:none; border-radius:6px;
    font-size:20px; cursor:pointer;
    font-family:'IBM Plex Mono',monospace;
    transition:background .15s, transform .1s;
    display:flex; align-items:center; justify-content:center; gap:10px;
  }
  #btn-play:hover{background:#5aa0e9;}
  #btn-play:active{transform:scale(.97);}
  #btn-play.playing{background:#c0392b;}
  #btn-play:disabled{background:#ccc; cursor:not-allowed; color:#fff;}

  /* INFO */
  .info-row{
    display:flex; justify-content:space-between; width:100%;
    font-size:11px; font-family:'IBM Plex Mono',monospace; color:var(--dim);
  }
  .info-val{color:var(--text);}

  /* PROGRESS BAR */
  .progress-wrap{width:100%; background:#e0e0e0; border-radius:3px; height:4px; overflow:hidden;}
  .progress-bar{height:4px; background:var(--accent); width:0%; border-radius:3px; transition:width .1s linear;}

  /* STATUS */
  #status{
    font-size:11px; font-family:'IBM Plex Mono',monospace;
    color:var(--dim); text-align:center; min-height:16px;
  }

  /* FOOTER */
  .footer{
    margin-top:28px; font-size:10px; color:#bbb;
    font-family:'IBM Plex Mono',monospace; text-align:center;
    line-height:1.6;
  }
  .footer a{color:var(--accent); text-decoration:none;}

  /* ERROR */
  .error-card{
    background:#fff5f5; border:1px solid #f0c0c0;
    border-radius:8px; padding:28px; text-align:center;
    width:100%; max-width:360px;
  }
  .error-card h2{color:#cc4444; font-size:14px; margin-bottom:10px; font-family:'IBM Plex Mono',monospace;}
  .error-card p{font-size:12px; color:#888; line-height:1.6;}
</style>
</head>
<body>

<a class="logo" href="./index.html">Fa</a>
<div class="subtitle">Sound Score Player</div>

<div id="main-card" class="card" style="display:none">
  <canvas id="viz"></canvas>

  <div class="note-display" id="note-chips"></div>

  <div class="progress-wrap">
    <div class="progress-bar" id="progress-bar"></div>
  </div>

  <div class="info-row">
    <span>음표</span><span class="info-val" id="info-notes">—</span>
    <span>길이</span><span class="info-val" id="info-dur">—</span>
  </div>

  <button id="btn-play" disabled>
    <span id="btn-icon">▶</span>
    <span id="btn-label">로딩 중...</span>
  </button>

  <div id="status">QR 악보를 불러오는 중...</div>
</div>

<div id="error-card" class="error-card" style="display:none">
  <h2>악보를 찾을 수 없어요</h2>
  <p>QR 코드가 잘못되었거나<br>만료된 링크일 수 있습니다.<br><br>
  Fake Adobe™ 메인 사이트에서<br>새 악보를 만들어보세요.</p>
</div>

<div class="footer">
  <a href="./index.html">← Fake Adobe™ 메인으로</a><br>
  소리는 이어폰을 꽂으면 더 잘 들려요 🎧
</div>

<script>
// ── PARSE SCORE FROM URL ──────────────────────────────
const NOTE_NAMES=['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
function freqToNote(f){
  const n=Math.round(12*Math.log2(f/440)+69);
  return NOTE_NAMES[((n%12)+12)%12]+(Math.floor(n/12)-1);
}

// ── SUPABASE CONFIG ──
const SUPABASE_URL = 'https://hbzwlrawarhmxkjhkixd.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhiendscmF3YXJobXhramhraXhkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk4MDY0NTUsImV4cCI6MjA5NTM4MjQ1NX0.6RNlIskTtWGN-99HBIPqHI7eR8mheVPg1Yuq9JyCNZ8';

let scorePoints=[];
let totalDur=0;

function parseCSV(csv){
  if(!csv) return false;
  try{
    const pts=csv.split('|').map(row=>{
      const parts=row.split('.').map(Number);
      if(parts.length<4) return null;
      const[f,p,v,d]=parts;
      if(!f||f<=0) return null;
      return{freq:f, pan:p/10, vol:Math.max(0.05,v/10), note:freqToNote(f), delta:d*10};
    }).filter(Boolean);
    if(!pts.length) return false;
    scorePoints=pts;
    let dur=0;
    for(let i=0;i<pts.length-1;i++){
      const gap=pts[i+1].delta-pts[i].delta;
      dur+=Math.min(gap,1500);
    }
    dur+=600; totalDur=Math.max(dur,500);
    return true;
  }catch(e){ console.error(e); return false; }
}

async function loadScore(){
  const params=new URLSearchParams(location.search);
  const id=params.get('id');
  const csv=params.get('s');

  if(id){
    // fetch from Supabase by ID
    try{
      const res=await fetch(
        `${SUPABASE_URL}/rest/v1/scores?id=eq.${id}&select=score_data,title,image_data`,
        { headers:{
            'Authorization':`Bearer ${SUPABASE_ANON_KEY}`,
            'apikey': SUPABASE_ANON_KEY
          }}
      );
      if(!res.ok) throw new Error('불러오기 실패');
      const [row]=await res.json();
      if(!row) throw new Error('악보를 찾을 수 없습니다');
      // show image if available
      if(row.image_data){
        const imgWrap=document.createElement('img');
        imgWrap.src=row.image_data;
        imgWrap.style.cssText='width:100%;border-radius:4px;margin-bottom:8px;opacity:.7;';
        document.querySelector('.card').insertBefore(imgWrap, document.getElementById('viz'));
      }
      if(row.title) document.title='Fake Adobe™ — '+row.title;
      return parseCSV(row.score_data);
    }catch(e){
      console.error(e); return false;
    }
  } else if(csv){
    return parseCSV(csv);
  }
  return false;
}

// ── VISUALIZER ──────────────────────────────────────
const vizCanvas=document.getElementById('viz');
const vCtx=vizCanvas.getContext('2d');
let vizData=[];

function initViz(){
  vizCanvas.width=vizCanvas.offsetWidth||320;
  vizCanvas.height=80;
  vizData=new Array(vizCanvas.width).fill(0);

  // pre-fill visualizer with note heights from score
  if(scorePoints.length){
    const W=vizCanvas.width;
    scorePoints.forEach((pt,i)=>{
      const x=Math.floor((i/scorePoints.length)*W);
      const h=pt.vol*60;
      if(x<W) vizData[x]=h;
    });
    // smooth
    for(let i=1;i<vizData.length-1;i++){
      vizData[i]=(vizData[i-1]+vizData[i]+vizData[i+1])/3;
    }
  }
  drawViz(0);
}

function drawViz(playheadX=-1){
  const W=vizCanvas.width, H=vizCanvas.height;
  vCtx.fillStyle='#111'; vCtx.fillRect(0,0,W,H);
  for(let x=0;x<W;x++){
    const h=vizData[x]||0;
    const played=playheadX>=0&&x<=playheadX;
    vCtx.fillStyle=played?'#4a90d9':'#2a4a6a';
    vCtx.fillRect(x, H-h, 1, h);
  }
  if(playheadX>=0){
    vCtx.strokeStyle='rgba(255,80,80,0.8)';
    vCtx.lineWidth=1.5;
    vCtx.beginPath(); vCtx.moveTo(playheadX,0); vCtx.lineTo(playheadX,H); vCtx.stroke();
  }
}

// ── AUDIO ────────────────────────────────────────────
let audioCtx=null;
function initAudio(){ if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)(); }

function playTone(freq,pan,vol,dur=0.5){
  const osc=audioCtx.createOscillator();
  const gain=audioCtx.createGain();
  const panN=audioCtx.createStereoPanner();
  osc.type='sine';
  osc.frequency.value=Math.max(20,freq);
  gain.gain.setValueAtTime(vol*0.3,audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+dur);
  panN.pan.value=Math.max(-1,Math.min(1,pan));
  osc.connect(gain); gain.connect(panN); panN.connect(audioCtx.destination);
  osc.start(); osc.stop(audioCtx.currentTime+dur);
}

// ── PLAYBACK ─────────────────────────────────────────
let isPlaying=false, playTimeouts=[], playRaf=null;

function stopPlayback(){
  isPlaying=false;
  playTimeouts.forEach(clearTimeout); playTimeouts=[];
  if(playRaf){cancelAnimationFrame(playRaf); playRaf=null;}
  document.getElementById('btn-play').classList.remove('playing');
  document.getElementById('btn-icon').textContent='▶';
  document.getElementById('btn-label').textContent='다시 재생';
  document.getElementById('progress-bar').style.width='0%';
  document.getElementById('status').textContent='재생 완료 — 다시 들으려면 ▶ 누르세요';
  drawViz(-1);
}

function startPlayback(){
  if(!scorePoints.length) return;
  initAudio();
  isPlaying=true;
  document.getElementById('btn-play').classList.add('playing');
  document.getElementById('btn-icon').textContent='■';
  document.getElementById('btn-label').textContent='정지';
  document.getElementById('status').textContent='재생 중...';

  const W=vizCanvas.width;
  const startWall=performance.now();

  function animFrame(now){
    if(!isPlaying) return;
    const prog=Math.min((now-startWall)/totalDur,1);
    document.getElementById('progress-bar').style.width=(prog*100)+'%';
    drawViz(prog*W);
    if(prog<1) playRaf=requestAnimationFrame(animFrame);
    else stopPlayback();
  }
  playRaf=requestAnimationFrame(animFrame);

  // schedule notes
  // reconstruct timing: each point fires at its original delta offset
  const t0=scorePoints[0].delta;
  let cursor=0;
  scorePoints.forEach((pt,i)=>{
    const tid=setTimeout(()=>{
      if(!isPlaying) return;
      playTone(pt.freq, pt.pan, pt.vol, 0.5);
    }, cursor);
    playTimeouts.push(tid);
    if(i<scorePoints.length-1){
      const gap=scorePoints[i+1].delta - pt.delta;
      cursor+=Math.min(gap, 1500);
    }
  });
  playTimeouts.push(setTimeout(stopPlayback, totalDur));
}

document.getElementById('btn-play').addEventListener('click',()=>{
  if(isPlaying){ stopPlayback(); return; }
  startPlayback();
});

// ── RENDER NOTE CHIPS ────────────────────────────────
function renderChips(){
  // show unique notes
  const seen=new Set();
  const chips=scorePoints
    .map(pt=>pt.note)
    .filter(n=>{ if(seen.has(n)) return false; seen.add(n); return true; })
    .slice(0,16);
  document.getElementById('note-chips').innerHTML=
    chips.map(n=>`<span class="note-chip">${n}</span>`).join('');
}

// ── INIT ─────────────────────────────────────────────
(async()=>{
  const ok=await loadScore();
  if(ok){
    document.getElementById('main-card').style.display='flex';
    const noteCount=scorePoints.length;
    const durSec=Math.round(totalDur/100)/10;
    document.getElementById('info-notes').textContent=noteCount+'개';
    document.getElementById('info-dur').textContent=durSec+'초';
    document.getElementById('status').textContent='▶ 버튼을 눌러 재생하세요';
    document.getElementById('btn-play').disabled=false;
    document.getElementById('btn-icon').textContent='▶';
    document.getElementById('btn-label').textContent='재생';
    renderChips();
    requestAnimationFrame(()=>{
      vizCanvas.width=vizCanvas.offsetWidth||320;
      initViz();
    });
  } else {
    document.getElementById('error-card').style.display='block';
  }
})();
</script>
</body>
</html>
